<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>爆分彈夾配置器</title>
<style>
*{box-sizing:border-box}:root{color-scheme:dark;--gold:#ffd27a;--cream:#fff7e8;--muted:#ead4b2;--line:rgba(255,224,170,.18);--cyan:#46d7ce}html,body{margin:0;min-height:100%;font-family:"Microsoft JhengHei","PingFang TC",Arial,sans-serif;color:var(--cream);background:#100a07}body{min-height:100vh;overflow-x:hidden;background:radial-gradient(circle at 50% -8%,rgba(255,210,122,.24),transparent 36%),radial-gradient(circle at 88% 28%,rgba(70,215,206,.14),transparent 28%),linear-gradient(180deg,#1a100b 0%,#0f0907 58%,#090605 100%)}body:before{content:"";position:fixed;inset:0;background:linear-gradient(115deg,transparent 0 38%,rgba(255,210,122,.06) 39%,transparent 48%),linear-gradient(245deg,transparent 0 54%,rgba(70,215,206,.05) 55%,transparent 64%);pointer-events:none}.app{width:min(100%,520px);margin:0 auto;padding:calc(8px + env(safe-area-inset-top)) 10px calc(18px + env(safe-area-inset-bottom))}.tabs{position:sticky;top:0;z-index:5;display:flex;gap:8px;overflow-x:auto;padding:5px 2px 11px;background:linear-gradient(180deg,rgba(16,10,7,.98),rgba(16,10,7,.76));border-bottom:1px solid rgba(255,224,170,.1);box-shadow:0 12px 28px rgba(0,0,0,.28);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{flex:0 0 auto;border:1px solid rgba(255,226,176,.28);border-radius:13px;background:linear-gradient(180deg,rgba(43,32,25,.88),rgba(24,18,15,.9));color:var(--cream);padding:11px 14px;font-size:13px;font-weight:900;line-height:1;white-space:nowrap;touch-action:manipulation;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 7px 18px rgba(0,0,0,.2)}.tab.on{background:linear-gradient(135deg,#ffe19a 0%,#f6b437 55%,#df8509 100%);color:#241505;border-color:#ffe5ae;box-shadow:0 8px 24px rgba(245,158,11,.34),inset 0 1px 0 rgba(255,255,255,.44)}.panel{display:none}.panel.active{display:block}.card{position:relative;overflow:hidden;border-radius:18px;background:linear-gradient(180deg,rgba(35,26,21,.84),rgba(20,15,12,.86));border:1px solid var(--line);box-shadow:0 24px 55px rgba(0,0,0,.44),inset 0 1px 0 rgba(255,255,255,.07);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}.card:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,210,122,.13),transparent 30%,rgba(70,215,206,.08));pointer-events:none}header{position:relative;padding:15px 14px 13px;border-bottom:1px solid rgba(255,255,255,.08)}h1{margin:0;font-size:23px;line-height:1.12;font-weight:950;text-shadow:0 2px 12px rgba(0,0,0,.38)}p,footer{color:var(--muted);font-size:12px;line-height:1.55;font-weight:700}p{margin:6px 0 12px}label{display:block;padding:11px;border-radius:15px;background:linear-gradient(180deg,rgba(255,248,236,.1),rgba(255,248,236,.045));border:1px solid rgba(255,224,170,.17);color:#f0d9b8;font-size:12px;font-weight:900}input{display:block;width:100%;height:56px;margin-top:8px;border-radius:12px;border:1px solid rgba(255,224,170,.43);background:rgba(12,9,7,.78);color:var(--cream);font-size:25px;font-weight:950;padding:0 14px}input:focus{outline:3px solid rgba(70,215,206,.25);border-color:rgba(255,210,122,.92)}.sum{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:11px}.sum div,.metric{background:linear-gradient(180deg,rgba(14,10,8,.72),rgba(10,8,7,.74));border:1px solid rgba(255,255,255,.075);border-radius:13px;padding:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.035)}span{display:block;color:#dec8a9;font-size:11px;font-weight:900}b{display:block;margin-top:5px;font-size:20px;line-height:1.12;color:var(--cream);text-shadow:0 2px 10px rgba(0,0,0,.34)}.rows{position:relative;display:grid;gap:9px;padding:10px}.row{border-radius:16px;border:1px solid rgba(255,255,255,.085);background:linear-gradient(180deg,rgba(255,248,236,.105),rgba(255,248,236,.055));padding:10px;box-shadow:0 8px 22px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.045)}.rowtop{display:flex;align-items:center;gap:8px;margin-bottom:9px}.lv{display:inline-flex;min-width:47px;height:28px;align-items:center;justify-content:center;border-radius:999px;background:linear-gradient(180deg,rgba(255,210,122,.26),rgba(255,210,122,.12));color:var(--gold);font-size:12px;font-weight:950;border:1px solid rgba(255,210,122,.12)}.note{color:#72d7ff;font-size:11px;font-weight:900;line-height:1.25;text-shadow:0 0 12px rgba(70,215,206,.28)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric b{font-size:18px}footer{position:relative;padding:0 12px 12px;margin:0}@media(max-width:360px){.app{padding:7px}.tab{font-size:12px;padding:10px 11px}header{padding:13px 12px 12px}h1{font-size:21px}b{font-size:18px}.metric b{font-size:16px}input{font-size:23px;height:53px}.row{padding:9px}.note{font-size:10px}}
</style>
</head>
<body>
<main class="app"><nav class="tabs" id="tabs"></nav><div id="panels"></div></main>
<script>
(function(){"use strict";var BASE=20000,last="";var NOTE="當下籌碼大於起始籌碼可買免遊";var modes=[{id:"boss",name:"升階打王流",rows:[["Lv1",5,500,100,""],["Lv2",10,1000,100,""],["Lv3",15,1500,100,""],["Lv4",50,3500,70,""],["Lv5",100,4500,45,""],["Lv6",200,9000,45,""]]},{id:"mode2",name:"訊號回防流",rows:[["Lv1",10,1000,100,""],["Lv2",50,2000,40,""],["Lv3",10,1000,100,""],["Lv4",100,3000,30,""],["Lv5",10,1000,100,""],["Lv6",300,12000,40,""]]},{id:"mode3",name:"保守打王流",rows:[["Lv1",10,2000,200,""],["Lv2",30,3000,100,""],["Lv3",50,3000,60,""],["Lv4",30,3000,100,""],["Lv5",80,4000,50,""],["Lv6",200,5000,25,""]]},{id:"mode4",name:"小資族0050",rows:[["Lv1",10,3000,300,""],["Lv2",30,3000,100,""],["Lv3",50,3000,60,NOTE],["Lv4",30,3000,100,""],["Lv5",80,4000,50,NOTE],["Lv6",200,4000,20,""]]},{id:"mode5",name:"土豪放大槓桿",rows:[["Lv1",30,2400,80,""],["Lv2",200,3000,15,NOTE],["Lv3",100,3000,30,""],["Lv4",50,3000,60,NOTE],["Lv5",100,3600,36,""],["Lv6",500,5000,10,""]]}];function all(s,c){return Array.prototype.slice.call((c||document).querySelectorAll(s))}function num(v){var x=Number(String(v||"").replace(/,/g,"").replace(/[^0-9.]/g,""));return isFinite(x)&&x>0?x:0}function fmt(x,d){x=Number(x)||0;var t=d?String(Math.round(x*100)/100):String(Math.round(x));var p=t.split(".");p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,",");return p.join(".")}function spin(x){return Math.abs(x)<.000001?"0":fmt(x,true)+"轉"}function build(){document.getElementById("tabs").innerHTML=modes.map(function(m,i){return '<button class="tab '+(i?"":"on")+'" type="button" data-mode="'+m.id+'">'+m.name+'</button>'}).join("");document.getElementById("panels").innerHTML=modes.map(function(m,i){return '<section class="panel '+(i?"":"active")+'" id="'+m.id+'" data-mode="'+m.id+'"><div class="card"><header><h1>'+m.name+'</h1><p>輸入總計彈夾後，下方會依照流派比例自動計算。</p><label>總計彈夾<input class="total" name="total" type="text" inputmode="numeric" autocomplete="off" value="0" placeholder="請輸入數字"></label><div class="sum"><div><span>總下注</span><b class="sumBet">0</b></div><div><span>總彈夾</span><b class="sumBullets">0</b></div><div><span>轉數</span><b class="sumSpins">0</b></div></div></header><div class="rows">'+m.rows.map(function(r){return '<article class="row" data-bet="'+r[1]+'" data-bullets="'+r[2]+'" data-spins="'+r[3]+'"><div class="rowtop"><div class="lv">'+r[0]+'</div>'+(r[4]?'<div class="note">'+r[4]+'</div>':'')+'</div><div class="grid"><div class="metric"><span>下注</span><b class="bet">0</b></div><div class="metric"><span>彈夾</span><b class="bullets">0</b></div><div class="metric"><span>轉數</span><b class="spins">0</b></div></div></article>'}).join("")+'</div><footer>只有總計彈夾需要輸入，下注、彈夾、轉數會自動計算。</footer></div></section>'}).join("")}function render(panel,total){var sb=0,ss=0;all(".row",panel).forEach(function(r){var b=num(r.dataset.bet)*total/BASE,c=num(r.dataset.bullets)*total/BASE,s=num(r.dataset.spins)*total/BASE;sb+=b;ss+=s;r.querySelector(".bet").textContent=fmt(b);r.querySelector(".bullets").textContent=fmt(c);r.querySelector(".spins").textContent=spin(s)});panel.querySelector(".sumBet").textContent=fmt(sb);panel.querySelector(".sumBullets").textContent=fmt(total);panel.querySelector(".sumSpins").textContent=spin(ss)}function calc(input){input=input||document.querySelector(".panel.active .total")||document.querySelector(".total");console.log("raw=",input.value,"number=",Number(input.value));var total=num(input.value);all(".total").forEach(function(i){if(i!==input)i.value=input.value});all(".panel").forEach(function(p){render(p,total)});last=input.value}function pick(id){all(".panel").forEach(function(p){p.classList.toggle("active",p.id===id)});all(".tab").forEach(function(t){t.classList.toggle("on",t.dataset.mode===id)});calc();if(location.hash!=="#"+id)location.hash=id}function boot(){build();all(".total").forEach(function(i){["input","change","keyup","paste","blur"].forEach(function(e){i.addEventListener(e,function(){setTimeout(function(){calc(i)},0)})})});all(".tab").forEach(function(t){t.addEventListener("click",function(){pick(t.dataset.mode)})});var h=(location.hash||"#boss").slice(1);pick(document.getElementById(h)?h:"boss");setInterval(function(){var i=document.querySelector(".panel.active .total");if(i&&i.value!==last)calc(i)},250)}window.addEventListener("hashchange",function(){var h=(location.hash||"#boss").slice(1);if(document.getElementById(h))pick(h)});document.readyState==="loading"?document.addEventListener("DOMContentLoaded",boot):boot()})();
</script>
</body>
</html>
