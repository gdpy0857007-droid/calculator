<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>爆分彈夾配置器</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Microsoft JhengHei","PingFang TC",Arial,sans-serif;color:#fff7e8;background:#100a07}body{min-height:100vh;background:radial-gradient(circle at 50% -12%,rgba(255,210,122,.3),transparent 34%),radial-gradient(circle at 90% 18%,rgba(70,215,206,.18),transparent 28%),linear-gradient(180deg,#1b100b,#0d0806 62%,#070504)}.wrap{width:min(100%,520px);margin:0 auto;padding:calc(8px + env(safe-area-inset-top)) 10px calc(18px + env(safe-area-inset-bottom))}.hide{display:none!important}.tabs{position:sticky;top:0;z-index:5;display:flex;gap:8px;overflow-x:auto;padding:6px 2px 10px;background:linear-gradient(180deg,rgba(16,10,7,.98),rgba(16,10,7,.78));border-bottom:1px solid rgba(255,224,170,.12);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.tabs::-webkit-scrollbar{display:none}.tab{flex:0 0 auto;border:1px solid rgba(255,226,176,.3);border-radius:13px;background:linear-gradient(180deg,rgba(43,32,25,.9),rgba(24,18,15,.95));color:#fff7e8;padding:11px 14px;font-size:13px;font-weight:900;white-space:nowrap;touch-action:manipulation}.tab.on{background:linear-gradient(135deg,#ffe19a,#f6b437 58%,#df8509);color:#241505;border-color:#ffe5ae}.login,.card{position:relative;overflow:hidden;border-radius:18px;background:linear-gradient(180deg,rgba(38,29,23,.88),rgba(18,13,10,.9));border:1px solid rgba(255,224,170,.18);box-shadow:0 24px 55px rgba(0,0,0,.44),inset 0 1px 0 rgba(255,255,255,.07)}.login{margin-top:18px}.login:before,.card:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,210,122,.12),transparent 34%,rgba(70,215,206,.08));pointer-events:none}.inner,header{position:relative;padding:15px 14px 13px;border-bottom:1px solid rgba(255,255,255,.08)}h1{margin:0;font-size:23px;line-height:1.15;font-weight:950;text-shadow:0 2px 12px rgba(0,0,0,.38)}p,footer{margin:6px 0 12px;color:#ead4b2;font-size:12px;line-height:1.55;font-weight:700}label{display:block;padding:11px;border-radius:15px;background:linear-gradient(180deg,rgba(255,248,236,.1),rgba(255,248,236,.045));border:1px solid rgba(255,224,170,.18);color:#f0d9b8;font-size:12px;font-weight:900}input{display:block;width:100%;height:56px;margin-top:8px;border-radius:12px;border:1px solid rgba(255,224,170,.44);background:rgba(12,9,7,.78);color:#fff7e8;font-size:25px;font-weight:950;padding:0 14px}input:focus{outline:3px solid rgba(70,215,206,.25);border-color:rgba(255,210,122,.92)}button.go{width:100%;height:48px;margin-top:10px;border:0;border-radius:12px;background:linear-gradient(135deg,#ffe19a,#f6b437 58%,#df8509);color:#241505;font-size:15px;font-weight:950}.err{display:none;margin-top:8px;color:#ffb4b4;font-size:12px;font-weight:900}.panel{display:none}.panel.active{display:block}.sum{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:11px}.sum div,.metric{background:linear-gradient(180deg,rgba(14,10,8,.72),rgba(10,8,7,.74));border:1px solid rgba(255,255,255,.075);border-radius:13px;padding:10px}.label{display:block;color:#dec8a9;font-size:11px;font-weight:900}.value{display:block;margin-top:5px;font-size:20px;line-height:1.12;color:#fff7e8;font-weight:950;text-shadow:0 2px 10px rgba(0,0,0,.34)}.rows{display:grid;gap:9px;padding:10px}.row{border-radius:16px;border:1px solid rgba(255,255,255,.085);background:linear-gradient(180deg,rgba(255,248,236,.105),rgba(255,248,236,.055));padding:10px}.rowtop{display:flex;align-items:center;gap:8px;margin-bottom:9px}.lv{display:inline-flex;min-width:47px;height:28px;align-items:center;justify-content:center;border-radius:999px;background:linear-gradient(180deg,rgba(255,210,122,.26),rgba(255,210,122,.12));color:#ffd27a;font-size:12px;font-weight:950;border:1px solid rgba(255,210,122,.12)}.note{color:#72d7ff;font-size:11px;font-weight:900;line-height:1.25;text-shadow:0 0 12px rgba(70,215,206,.28)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric .value{font-size:18px}footer{position:relative;padding:0 12px 12px;margin:0}@media(max-width:360px){.wrap{padding:7px}.tab{font-size:12px;padding:10px 11px}h1{font-size:21px}.value{font-size:18px}.metric .value{font-size:16px}input{font-size:23px;height:53px}.row{padding:9px}.note{font-size:10px}}
</style>
</head>
<body>
<main class="wrap">
<section class="login" id="login"><div class="inner"><h1>爆分彈夾配置器</h1><p>請輸入授權碼。授權碼有效至 2026-06-25 23:59:59。</p><label>授權碼<input id="codeInput" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="0001"></label><button class="go" id="loginBtn" type="button">進入</button><div class="err" id="loginError">授權碼錯誤或已過期。</div></div></section>
<section id="app" class="hide"><nav class="tabs" id="tabs"></nav><div id="panels"></div></section>
</main>
<script>
(function(){
'use strict';
var CODES=['0001','0002','0003','0004','0005','0006','0007','0008','0009','0010'];
var EXPIRES_AT=new Date('2026-06-25T23:59:59+08:00').getTime();
var BASE=20000,last='';
var MODES=[
{id:'boss',name:'升階打王流',rows:[['Lv1',5,500,100,''],['Lv2',10,1000,100,''],['Lv3',15,1500,100,''],['Lv4',50,3500,70,''],['Lv5',100,4500,45,''],['Lv6',200,9000,45,'']]},
{id:'mode2',name:'訊號回防流',rows:[['Lv1',10,1000,100,''],['Lv2',50,2000,40,''],['Lv3',10,1000,100,''],['Lv4',100,3000,30,''],['Lv5',10,1000,100,''],['Lv6',300,12000,40,'']]},
{id:'mode3',name:'保守打王流',rows:[['Lv1',10,2000,200,''],['Lv2',30,3000,100,''],['Lv3',50,3000,60,''],['Lv4',30,3000,100,''],['Lv5',80,4000,50,''],['Lv6',200,5000,25,'']]},
{id:'mode4',name:'小資族0050',rows:[['Lv1',10,3000,300,''],['Lv2',30,3000,100,''],['Lv3',50,3000,60,'當下籌碼大於起始籌碼可買免遊'],['Lv4',30,3000,100,''],['Lv5',80,4000,50,'當下籌碼大於起始籌碼可買免遊'],['Lv6',200,4000,20,'']]},
{id:'mode5',name:'土豪放大槓桿',rows:[['Lv1',30,2400,80,''],['Lv2',200,3000,15,'當下籌碼大於起始籌碼可買免遊'],['Lv3',100,3000,30,''],['Lv4',50,3000,60,'當下籌碼大於起始籌碼可買免遊'],['Lv5',100,3600,36,''],['Lv6',500,5000,10,'']]}
];
function $(s,c){return (c||document).querySelector(s)}
function all(s,c){return Array.prototype.slice.call((c||document).querySelectorAll(s))}
function cleanNumber(v){var s=String(v||'').replace(/,/g,'').replace(/[^0-9.]/g,'');var n=Number(s);return isFinite(n)&&n>0?n:0}
function fmt(n,d){n=Number(n)||0;var s=d?String(Math.round(n*100)/100):String(Math.round(n));var p=s.split('.');p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');return p.join('.')}
function spin(n){return Math.abs(n)<0.000001?'0':fmt(n,true)+'轉'}
function validStored(){try{var a=JSON.parse(localStorage.getItem('vipAuth')||'null');return a&&CODES.indexOf(a.code)>-1&&Date.now()<a.expires&&Date.now()<EXPIRES_AT}catch(e){return false}}
function login(){var code=String($('#codeInput').value||'').trim();if(CODES.indexOf(code)>-1&&Date.now()<EXPIRES_AT){localStorage.setItem('vipAuth',JSON.stringify({code:code,expires:EXPIRES_AT}));showApp()}else{$('#loginError').style.display='block'}}
function showApp(){$('#login').classList.add('hide');$('#app').classList.remove('hide');build();bindCalc()}
function build(){
$('#tabs').innerHTML=MODES.map(function(m,i){return '<button class="tab '+(i?'':'on')+'" type="button" data-mode="'+m.id+'">'+m.name+'</button>'}).join('');
$('#panels').innerHTML=MODES.map(function(m,i){return '<section class="panel '+(i?'':'active')+'" id="'+m.id+'"><div class="card"><header><h1>'+m.name+'</h1><p>輸入總計彈夾後，下方會依照流派比例自動計算。</p><label>總計彈夾<input class="total" name="total" type="text" inputmode="numeric" autocomplete="off" value="0" placeholder="請輸入數字"></label><div class="sum"><div><span class="label">總下注</span><b class="value sumBet">0</b></div><div><span class="label">總彈夾</span><b class="value sumBullets">0</b></div><div><span class="label">轉數</span><b class="value sumSpins">0</b></div></div></header><div class="rows">'+m.rows.map(function(r){return '<article class="row" data-bet="'+r[1]+'" data-bullets="'+r[2]+'" data-spins="'+r[3]+'"><div class="rowtop"><div class="lv">'+r[0]+'</div>'+(r[4]?'<div class="note">'+r[4]+'</div>':'')+'</div><div class="grid"><div class="metric"><span class="label">下注</span><b class="value bet">0</b></div><div class="metric"><span class="label">彈夾</span><b class="value bullets">0</b></div><div class="metric"><span class="label">轉數</span><b class="value spins">0</b></div></div></article>'}).join('')+'</div><footer>只有總計彈夾需要輸入，下注、彈夾、轉數會自動計算。</footer></div></section>'}).join('');
}
function render(panel,total){var sumBet=0,sumSpins=0;all('.row',panel).forEach(function(row){var bet=cleanNumber(row.dataset.bet)*total/BASE;var bullets=cleanNumber(row.dataset.bullets)*total/BASE;var spins=cleanNumber(row.dataset.spins)*total/BASE;sumBet+=bet;sumSpins+=spins;$('.bet',row).textContent=fmt(bet);$('.bullets',row).textContent=fmt(bullets);$('.spins',row).textContent=spin(spins)});$('.sumBet',panel).textContent=fmt(sumBet);$('.sumBullets',panel).textContent=fmt(total);$('.sumSpins',panel).textContent=spin(sumSpins)}
function calculate(input){input=input||$('.panel.active .total')||$('.total');if(!input)return;console.log('raw=',input.value,'number=',Number(input.value));var total=cleanNumber(input.value);all('.total').forEach(function(other){if(other!==input)other.value=input.value});all('.panel').forEach(function(panel){render(panel,total)});last=input.value}
function pick(id){all('.panel').forEach(function(p){p.classList.toggle('active',p.id===id)});all('.tab').forEach(function(t){t.classList.toggle('on',t.dataset.mode===id)});calculate($('.panel.active .total'));if(location.hash!=='#'+id)location.hash=id}
function bindCalc(){all('.total').forEach(function(input){['input','change','keyup','paste','blur'].forEach(function(evt){input.addEventListener(evt,function(){setTimeout(function(){calculate(input)},0)})})});all('.tab').forEach(function(btn){btn.addEventListener('click',function(e){e.preventDefault();pick(btn.dataset.mode)})});var h=(location.hash||'#boss').slice(1);pick(document.getElementById(h)?h:'boss');setInterval(function(){var input=$('.panel.active .total');if(input&&input.value!==last)calculate(input)},250)}
$('#loginBtn').addEventListener('click',login);$('#codeInput').addEventListener('keydown',function(e){if(e.key==='Enter')login()});if(validStored())showApp();
})();
</script>
</body>
</html>
